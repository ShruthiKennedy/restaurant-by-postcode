<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/css/normalize.css" />
    <link rel="stylesheet" href="./src/css/styles.css" />
    <title>Restaurant by Postcode</title>
  </head>
  <body>
    <div class="post">
      <header class="post__header">
        <h2 class="post__title">At your Doorstep</h2>
      </header>
    </div>
    <section class="container block-domain">
      <h3 class="post__purpose">Search using postcode</h3>
      <div class="input-group">
        <input
          id="postcode"
          type="text"
          class="input"
          placeholder="Enter postcode here"
        />
        <button id="searchBtn" class="btn btn--accent">Search</button>
      </div>
      <p id="error" class="error"></p>
    </section>

    <div id="cardsContainer" class="container grid"></div>
    <div id="loading" class="loading" style="display: none">
      <p class="loading__text">Finding restaurants...</p>
    </div>
  </body>
  <script type="module" src="./src/main.js"></script>
</html>
