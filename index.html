<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/css/normalize.css" />
    <link rel="stylesheet" href="./src/css/styles.css" />
    <title>Restaurant by Postcode</title>
  </head>
  <body>
    <div class="post">
      <header class="post__header">
        <h2 class="post__title">Title</h2>
      </header>
    </div>
    <section class="container block-domain">
      <h3 class="post__purpose">Search using postcode</h3>
      <div class="input-group">
        <input type="text" class="input" placeholder="Enter postcode here" />
        <button class="btn btn--accent">Search</button>
      </div>
    </section>
    <div class="container grid">
      <div class="plan plan--restaurant grid-item">
        <div class="card">
          <header class="card__header">
            <h3 class="plan__name">Dominos</h3>
          </header>
          <div class="card__body">
            <ul class="list">
              <li class="list__item">4.2</li>
              <li class="list__item">Pizza</li>
              <li class="list__item">Amstelveen</li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
